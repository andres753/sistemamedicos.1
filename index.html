<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Mi Album en MockAPI</title>
    <style>
        /* Mismos estilos que tienes, los dejo igual */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .login-container {
            max-width: 400px;
            margin: 100px auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }

        .login-container h2 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .login-container input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.1em;
        }

        .login-container button {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            cursor: pointer;
            transition: all 0.3s;
        }

        .login-btn {
            background: #667eea;
            color: white;
        }

        .register-btn {
            background: #4ecdc4;
            color: white;
        }

        .login-container button:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .main-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: none;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            color: #667eea;
            font-size: 2.5em;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 20px;
            background: #f0f0f0;
            padding: 15px 25px;
            border-radius: 50px;
        }

        .logout-btn {
            padding: 10px 25px;
            background: #ff4757;
            color: white;
            border: none;
            border-radius: 30px;
            cursor: pointer;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 20px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            background: #f8f9ff;
            cursor: pointer;
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        .upload-area:hover {
            background: #e8eaff;
            transform: scale(1.02);
        }

        .upload-icon {
            font-size: 4em;
            margin-bottom: 10px;
        }

        .upload-progress {
            margin: 20px 0;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
            display: none;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            width: 0%;
            transition: width 0.3s;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 30px;
            background: #f0f0f0;
            color: #666;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .media-item {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transition: all 0.3s;
        }

        .media-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .media-preview {
            width: 100%;
            height: 200px;
            object-fit: cover;
            cursor: pointer;
            background: #f0f0f0;
        }

        .video-preview-container {
            position: relative;
            width: 100%;
            height: 200px;
            cursor: pointer;
            background: #000;
        }

        .video-preview-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .video-preview-container:hover .video-overlay,
        .video-preview-container:active .video-overlay {
            opacity: 1;
        }

        .play-icon {
            font-size: 3em;
            color: white;
            text-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        .media-info {
            padding: 15px;
        }

        .media-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .media-btn {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }

        .download-btn {
            background: #667eea;
            color: white;
        }

        .delete-btn {
            background: #ff4757;
            color: white;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            max-width: 95%;
            max-height: 95%;
        }

        .modal-content video {
            max-width: 100%;
            max-height: 90vh;
            background: black;
        }

        .modal-content img {
            max-width: 100%;
            max-height: 90vh;
        }

        .close-modal {
            position: absolute;
            top: 20px;
            right: 30px;
            color: white;
            font-size: 3em;
            cursor: pointer;
            z-index: 1001;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .loading {
            text-align: center;
            padding: 50px;
            display: none;
        }

        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }

        /* Mejoras para móviles */
        @media (max-width: 768px) {
            .upload-area {
                padding: 20px;
            }
            
            .media-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }
            
            .header h1 {
                font-size: 2em;
            }
            
            .user-info {
                padding: 10px 15px;
            }
            
            .close-modal {
                top: 10px;
                right: 20px;
                font-size: 2.5em;
            }
        }
    </style>
</head>
<body>
    <div class="login-container" id="loginScreen">
        <h2>📸 Mi Álbum</h2>
        <p>✨ Con MockAPI ✨</p>
        
        <input type="text" id="username" placeholder="Usuario">
        <input type="password" id="password" placeholder="Contraseña">
        
        <button class="login-btn" onclick="login()">Iniciar Sesión</button>
        <button class="register-btn" onclick="register()">Registrarse</button>
        
        <div class="message" id="message"></div>
    </div>

    <div class="main-container" id="mainContainer">
        <div class="header">
            <h1>📸 Mi Álbum</h1>
            <div class="user-info">
                <span id="userDisplay"></span>
                <button class="logout-btn" onclick="logout()">Salir</button>
            </div>
        </div>

        <div class="upload-progress" id="uploadProgress">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Subiendo: 0%</div>
        </div>

        <div class="upload-area" id="uploadArea" onclick="triggerFileInput()">
            <div class="upload-icon">📤</div>
            <h3>Sube tus archivos</h3>
            <p>Arrastra o haz clic (MP4, JPG, PNG, etc)</p>
            <input type="file" id="fileInput" multiple accept="image/*,video/mp4,video/quicktime,video/*" style="display: none;" onchange="handleFileSelect(this.files)">
        </div>

        <div class="filters">
            <button class="filter-btn active" onclick="filterMedia('all')">📁 Todos</button>
            <button class="filter-btn" onclick="filterMedia('image')">🖼️ Fotos</button>
            <button class="filter-btn" onclick="filterMedia('video')">🎥 Videos</button>
        </div>

        <div class="loading" id="loading">
            <p>Cargando...</p>
        </div>

        <div class="media-grid" id="mediaGrid"></div>
        
        <div id="emptyMessage" style="text-align: center; padding: 50px; display: none;">
            <p>No hay archivos aún</p>
        </div>
    </div>

    <div class="modal" id="previewModal" onclick="closeModal()">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <div class="modal-content" id="modalContent"></div>
    </div>

    <script>
        // ===== TU URL DE MOCKAPI =====
        const MOCKAPI_URL = 'https://69b9c6acb3dcf7e0b4bb2998.mockapi.io/GENIOSYSABIOS';
        
        let currentUser = null;
        let allMedia = [];
        let currentFilter = 'all';

        // Detectar si es móvil
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);

        // Función para abrir selector de archivos (funciona en todos los dispositivos)
        function triggerFileInput() {
            document.getElementById('fileInput').click();
        }

        // Verificar sesión guardada
        window.addEventListener('load', async () => {
            const savedUser = localStorage.getItem('currentUser');
            if (savedUser) {
                try {
                    currentUser = JSON.parse(savedUser);
                    const response = await fetch(`${MOCKAPI_URL}/FILES/${currentUser.id}`);
                    if (response.ok) {
                        document.getElementById('userDisplay').textContent = currentUser.username;
                        document.getElementById('loginScreen').style.display = 'none';
                        document.getElementById('mainContainer').style.display = 'block';
                        loadFiles();
                    } else {
                        localStorage.removeItem('currentUser');
                    }
                } catch (error) {
                    console.error('Error:', error);
                    localStorage.removeItem('currentUser');
                }
            }
        });

        // Registro de usuario
        async function register() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showMessage('Completa todos los campos');
                return;
            }

            try {
                const response = await fetch(`${MOCKAPI_URL}/FILES?username=${username}&type=user`);
                const existingUsers = await response.json();
                
                if (existingUsers.length > 0) {
                    showMessage('El usuario ya existe');
                    return;
                }

                const newUser = {
                    username: username,
                    password: password,
                    type: 'user',
                    name: `Usuario: ${username}`,
                    date: new Date().toLocaleString(),
                    createdAt: new Date().toISOString(),
                    data: '',
                    size: 0
                };

                const createResponse = await fetch(`${MOCKAPI_URL}/FILES`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(newUser)
                });

                if (createResponse.ok) {
                    showMessage('✅ Registro exitoso. Ahora inicia sesión', false);
                    document.getElementById('username').value = username;
                    document.getElementById('password').value = '';
                } else {
                    showMessage('Error al registrar');
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error de conexión');
            }
        }

        // INICIO DE SESIÓN
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                showMessage('Completa todos los campos');
                return;
            }

            try {
                const response = await fetch(`${MOCKAPI_URL}/FILES?username=${username}&password=${password}&type=user`);
                const users = await response.json();

                if (users.length === 1) {
                    currentUser = users[0];
                    localStorage.setItem('currentUser', JSON.stringify(currentUser));
                    
                    document.getElementById('userDisplay').textContent = currentUser.username;
                    document.getElementById('password').value = '';
                    
                    document.getElementById('loginScreen').style.display = 'none';
                    document.getElementById('mainContainer').style.display = 'block';
                    
                    loadFiles();
                } else {
                    showMessage('❌ Usuario o contraseña incorrectos');
                    document.getElementById('password').value = '';
                }
            } catch (error) {
                console.error('Error:', error);
                showMessage('Error de conexión');
            }
        }

        function logout() {
            currentUser = null;
            localStorage.removeItem('currentUser');
            document.getElementById('loginScreen').style.display = 'block';
            document.getElementById('mainContainer').style.display = 'none';
            document.getElementById('mediaGrid').innerHTML = '';
        }

        // Manejador de selección de archivos
        function handleFileSelect(files) {
            if (!files || files.length === 0) return;
            
            // Convertir a array
            const fileArray = Array.from(files);
            
            // Validar tamaños (máx 10MB para móviles, 20MB para escritorio)
            const maxSize = isMobile ? 10 * 1024 * 1024 : 20 * 1024 * 1024;
            
            const validFiles = fileArray.filter(file => {
                if (file.size > maxSize) {
                    showMessage(`❌ ${file.name} es muy grande (máx ${maxSize/(1024*1024)}MB)`);
                    return false;
                }
                return true;
            });
            
            if (validFiles.length > 0) {
                uploadFiles(validFiles);
            }
        }

        // Cargar archivos del usuario
        async function loadFiles() {
            if (!currentUser) return;
            
            document.getElementById('loading').style.display = 'block';
            
            try {
                const response = await fetch(`${MOCKAPI_URL}/FILES?userId=${currentUser.id}`);
                const allItems = await response.json();
                
                // Filtrar solo archivos (no usuarios)
                allMedia = allItems.filter(item => item.type && item.type !== 'user');
                
                console.log('Archivos cargados:', allMedia.length);
                renderMedia();
            } catch (error) {
                console.error('Error cargando archivos:', error);
                showMessage('Error al cargar archivos');
            }
            
            document.getElementById('loading').style.display = 'none';
        }

        // Subir archivos
        async function uploadFiles(files) {
            if (!currentUser) {
                alert('Debes iniciar sesión primero');
                return;
            }

            const progressDiv = document.getElementById('uploadProgress');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            progressDiv.style.display = 'block';
            
            let uploadedCount = 0;
            let errorCount = 0;
            
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                
                const percent = Math.round((i / files.length) * 100);
                progressFill.style.width = percent + '%';
                progressText.textContent = `Subiendo: ${percent}% - ${file.name}`;
                
                try {
                    // Determinar tipo MIME correcto
                    let fileType = file.type;
                    
                    // Si es MP4 pero el tipo no está bien definido
                    if (file.name.toLowerCase().endsWith('.mp4') && !fileType) {
                        fileType = 'video/mp4';
                    } else if (file.name.toLowerCase().endsWith('.mov')) {
                        fileType = 'video/quicktime';
                    } else if (file.name.toLowerCase().match(/\.(jpg|jpeg)$/)) {
                        fileType = 'image/jpeg';
                    } else if (file.name.toLowerCase().endsWith('.png')) {
                        fileType = 'image/png';
                    }
                    
                    // Usar promesa para leer el archivo
                    const dataUrl = await new Promise((resolve, reject) => {
                        const reader = new FileReader();
                        reader.onload = (e) => resolve(e.target.result);
                        reader.onerror = (e) => reject(e);
                        reader.readAsDataURL(file);
                    });
                    
                    const mediaItem = {
                        userId: currentUser.id,
                        username: currentUser.username,
                        name: file.name,
                        type: fileType || 'application/octet-stream',
                        size: file.size,
                        data: dataUrl,
                        date: new Date().toLocaleString()
                    };

                    const response = await fetch(`${MOCKAPI_URL}/FILES`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(mediaItem)
                    });

                    if (response.ok) {
                        uploadedCount++;
                        console.log(`✅ Subido: ${file.name}`);
                    } else {
                        const errorText = await response.text();
                        console.error(`❌ Error: ${errorText}`);
                        errorCount++;
                    }
                } catch (error) {
                    console.error('Error:', error);
                    errorCount++;
                }
            }
            
            progressFill.style.width = '100%';
            
            if (errorCount > 0) {
                progressText.textContent = `✅ ${uploadedCount} subidos, ${errorCount} errores`;
                showMessage(`Subidos: ${uploadedCount}, Errores: ${errorCount}`, true);
            } else {
                progressText.textContent = '✅ Completado';
                showMessage('✅ Archivos subidos correctamente', false);
            }
            
            // Recargar archivos
            await loadFiles();
            
            setTimeout(() => {
                progressDiv.style.display = 'none';
                progressFill.style.width = '0%';
            }, 3000);
        }

        // Eliminar archivo
        async function deleteMedia(id) {
            if (!confirm('¿Eliminar este archivo?')) return;
            
            try {
                const response = await fetch(`${MOCKAPI_URL}/FILES/${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    allMedia = allMedia.filter(item => item.id !== id);
                    renderMedia();
                    showMessage('Archivo eliminado', false);
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Error al eliminar');
            }
        }

        // Descargar archivo
        function downloadMedia(item) {
            const link = document.createElement('a');
            link.href = item.data;
            link.download = item.name;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        function filterMedia(type) {
            currentFilter = type;
            
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            renderMedia();
        }

        function renderMedia() {
            const grid = document.getElementById('mediaGrid');
            const emptyMessage = document.getElementById('emptyMessage');
            
            let filtered = allMedia;
            
            if (currentFilter !== 'all') {
                filtered = filtered.filter(item => {
                    if (!item.type) return false;
                    if (currentFilter === 'image') return item.type.startsWith('image/');
                    if (currentFilter === 'video') return item.type.startsWith('video/');
                    return false;
                });
            }
            
            if (filtered.length === 0) {
                grid.innerHTML = '';
                emptyMessage.style.display = 'block';
                return;
            }
            
            emptyMessage.style.display = 'none';
            
            grid.innerHTML = filtered.map(item => {
                const isImage = item.type && item.type.startsWith('image/');
                const isVideo = item.type && item.type.startsWith('video/');
                
                let previewHtml = '';
                
                if (isImage) {
                    previewHtml = `<img src="${item.data}" class="media-preview" onclick="openPreview('${item.id}')" loading="lazy">`;
                } else if (isVideo) {
                    previewHtml = `
                        <div class="video-preview-container" onclick="openPreview('${item.id}')">
                            <video muted preload="metadata" playsinline>
                                <source src="${item.data}" type="${item.type}">
                            </video>
                            <div class="video-overlay">
                                <span class="play-icon">▶</span>
                            </div>
                        </div>
                    `;
                }
                
                // Escapar para HTML
                const safeName = item.name.replace(/'/g, "&apos;").replace(/"/g, "&quot;");
                
                return `
                    <div class="media-item">
                        ${previewHtml}
                        <div class="media-info">
                            <div><strong>${truncateName(safeName)}</strong></div>
                            <div style="font-size: 0.8em; color: #666;">${item.date || ''}</div>
                            <div class="media-actions">
                                <button class="media-btn download-btn" onclick='downloadMedia(${JSON.stringify(item).replace(/'/g, "&apos;")})'>⬇️ Descargar</button>
                                <button class="media-btn delete-btn" onclick="deleteMedia('${item.id}')">🗑️ Eliminar</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function truncateName(name, maxLength = 25) {
            if (!name) return '';
            if (name.length <= maxLength) return name;
            return name.substr(0, maxLength) + '...';
        }

        function openPreview(id) {
            const item = allMedia.find(m => m.id === id);
            if (!item) return;
            
            const modal = document.getElementById('previewModal');
            const modalContent = document.getElementById('modalContent');
            
            if (item.type && item.type.startsWith('image/')) {
                modalContent.innerHTML = `<img src="${item.data}" alt="${item.name}" style="max-width: 100%; max-height: 90vh;">`;
            } else if (item.type && item.type.startsWith('video/')) {
                modalContent.innerHTML = `
                    <video controls autoplay playsinline style="max-width: 100%; max-height: 90vh;">
                        <source src="${item.data}" type="${item.type}">
                        Tu navegador no soporta videos.
                    </video>
                `;
            }
            
            modal.style.display = 'flex';
        }

        function closeModal() {
            const modal = document.getElementById('previewModal');
            const modalContent = document.getElementById('modalContent');
            
            const video = modalContent.querySelector('video');
            if (video) video.pause();
            
            modal.style.display = 'none';
            modalContent.innerHTML = '';
        }

        function showMessage(text, isError = true) {
            const msg = document.getElementById('message');
            msg.style.display = 'block';
            msg.textContent = text;
            msg.style.background = isError ? '#ff4757' : '#51cf66';
            msg.style.color = 'white';
            
            setTimeout(() => {
                msg.style.display = 'none';
            }, 3000);
        }

        // Drag and drop para escritorio
        const uploadArea = document.getElementById('uploadArea');
        
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#e8eaff';
        });
        
        uploadArea.addEventListener('dragleave', () => {
            uploadArea.style.background = '#f8f9ff';
        });
        
        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.style.background = '#f8f9ff';
            const files = Array.from(e.dataTransfer.files);
            handleFileSelect(files);
        });

        // Cerrar modal con Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeModal();
        });
    </script>
</body>
</html>
